name: Costco Retail API - CI/CD Pipeline

# TRIGGER - when does pipeline run?
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── JOB 1: TEST ──
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      # Step 1 - Get the code
      - name: Checkout Code
        uses: actions/checkout@v3

      # Step 2 - Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # Step 3 - Cache dependencies (what you did at Costco!)
      - name: Cache Node Modules
        uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package.json') }}

      # Step 4 - Install dependencies
      - name: Install Dependencies
        run: npm install

      # Step 5 - Run all 9 tests
      - name: Run Tests
        run: npm test

  # ── JOB 2: BUILD & PUSH DOCKER ──
  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: test          # only runs if tests pass!

    steps:
      # Step 1 - Get the code
      - name: Checkout Code
        uses: actions/checkout@v3

      # Step 2 - Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 3 - Build Docker image
      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/costco-retail-api:latest .

      # Step 4 - Push to Docker Hub
      - name: Push to Docker Hub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/costco-retail-api:latest

  # ── JOB 3: DEPLOY ──
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: docker        # only runs if docker build passes!

    steps:
      - name: Deployment Success
        run: |
          echo "✅ Tests passed!"
          echo "✅ Docker image built!"
          echo "✅ Image pushed to Docker Hub!"
          echo "✅ Costco Retail API is ready to deploy!"
          echo "🚀 Pipeline completed successfully!"